<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <title>Orb - RAG Chatbot</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Chakra UI components will be added later if needed -->

    <!-- External CSS files -->
    <link rel="stylesheet" href="styles/globals.css" />
    <link rel="stylesheet" href="styles/components.css" />

    <!-- Note: All CSS has been moved to external files in styles/ directory -->
  </head>
  <body>
    <div id="root"></div>

    <!-- External JavaScript files -->
    <script src="utils/http.js"></script>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      function FeedbackButtons({ messageId, query, answer }) {
        const [feedback, setFeedback] = useState(null); // null | "positive" | "negative"
        const [showInput, setShowInput] = useState(false);
        const [improvementText, setImprovementText] = useState("");
        const [error, setError] = useState(null);
        const [sending, setSending] = useState(false);

        const handlePositive = async () => {
          // Toggle off if already positive
          if (feedback === "positive") {
            setFeedback(null);
            return;
          }
          setFeedback("positive");
          setShowInput(false);
          setImprovementText("");
          setError(null);
          try {
            await http.post("/api/feedback", {
              message_id: messageId,
              query,
              answer,
              feedback_type: "positive",
            });
          } catch (e) {
            setError("送信に失敗しました");
            setFeedback(null);
          }
        };

        const handleNegative = () => {
          // Toggle off if already negative
          if (feedback === "negative") {
            setFeedback(null);
            setShowInput(false);
            setImprovementText("");
            setError(null);
            return;
          }
          setFeedback("negative");
          setShowInput(true);
          setError(null);
        };

        const handleCancel = () => {
          setFeedback(null);
          setShowInput(false);
          setImprovementText("");
          setError(null);
        };

        const handleSubmitImprovement = async () => {
          if (sending) return;
          setSending(true);
          setError(null);
          try {
            await http.post("/api/feedback", {
              message_id: messageId,
              query,
              answer,
              feedback_type: "negative",
              improvement_request: improvementText.trim() || null,
            });
            setShowInput(false);
          } catch (e) {
            setError("送信に失敗しました");
          } finally {
            setSending(false);
          }
        };

        return (
          <div className="flex items-start space-x-2">
            <button
              className={`px-3 py-1 text-sm font-medium rounded-md transition-colors ${
                feedback === "positive" 
                  ? "bg-green-600 text-white" 
                  : "bg-gray-200 text-gray-700 hover:bg-gray-300"
              }`}
              onClick={handlePositive}
              title={feedback === "positive" ? "取り消す" : "Good answer"}
            >
              👍 Good
            </button>
            <button
              className={`px-3 py-1 text-sm font-medium rounded-md transition-colors ${
                feedback === "negative" 
                  ? "bg-red-600 text-white" 
                  : "bg-gray-200 text-gray-700 hover:bg-gray-300"
              }`}
              onClick={handleNegative}
              title={feedback === "negative" ? "取り消す" : "Needs improvement"}
            >
              👎 Needs work
            </button>
            {error && (
              <span className="text-red-600 text-sm mt-1">{error}</span>
            )}
            {showInput && (
              <div className="flex-1 space-y-2">
                <textarea
                  className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm resize-none"
                  value={improvementText}
                  onChange={(e) => setImprovementText(e.target.value)}
                  placeholder="どのように改善してほしいですか？（任意）"
                  rows={3}
                />
                <div className="flex space-x-2">
                  <button
                    className="px-3 py-1 bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium rounded-md transition-colors disabled:bg-gray-400"
                    onClick={handleSubmitImprovement}
                    disabled={sending}
                  >
                    {sending ? "送信中..." : "送信"}
                  </button>
                  <button
                    className="px-3 py-1 bg-gray-200 hover:bg-gray-300 text-gray-700 text-sm font-medium rounded-md transition-colors"
                    onClick={handleCancel}
                  >
                    キャンセル
                  </button>
                </div>
              </div>
            )}
          </div>
        );
      }

      function App() {
        const [messages, setMessages] = useState([]);
        const [inputValue, setInputValue] = useState("");
        const [searchMode, setSearchMode] = useState("auto");
        const [scopeFolder, setScopeFolder] = useState("");
        const [scopeTags, setScopeTags] = useState("");
        const [isLoading, setIsLoading] = useState(false);
        const abortControllerRef = React.useRef(null);
        const [status, setStatus] = useState({ index_status: "not_indexed" });
        const [config, setConfig] = useState({});
        const [showConfig, setShowConfig] = useState(false);
        const messagesEndRef = useRef(null);

        const scrollToBottom = () => {
          messagesEndRef.current?.scrollIntoView({ behavior: "smooth" });
        };

        useEffect(() => {
          scrollToBottom();
        }, [messages]);

        useEffect(() => {
          loadStatus();
          loadConfig();
        }, []);

        const createObsidianUri = (filePath) => {
          // Convert file path to Obsidian URI format
          // Example: /path/to/vault/2026-04-01.md -> obsidian://open?file=2026-04-01
          if (!filePath) return "#";

          // Extract filename from path and remove ::0, ::1, etc. at the end
          const filename = filePath.split("/").pop().replace(".md", "").replace(/::\d+$/, "");
          return `obsidian://open?file=${encodeURIComponent(filename)}`;
        };

        // JSON構造化データをレンダリングする関数
        const renderAnswerBlocks = (answerBlocks, citations) => {
          if (!answerBlocks || answerBlocks.length === 0) {
            return <div className="text-gray-800">No answer blocks available.</div>;
          }

          return answerBlocks.map((block, index) => {
            switch (block.type) {
              case "summary":
                return (
                  <div key={index} className="mb-4 p-4 bg-blue-50 border border-blue-200 rounded-lg">
                    <h4 className="font-semibold text-blue-800 mb-2">{block.title}</h4>
                    <p className="text-blue-700 mb-3">{renderTextWithCitationLinks(block.content, citations)}</p>
                    {block.items && block.items.length > 0 && (
                      <ul className="list-disc list-inside text-blue-700 space-y-1">
                        {block.items.map((item, itemIndex) => (
                          <li key={itemIndex}>{renderTextWithCitationLinks(item, citations)}</li>
                        ))}
                      </ul>
                    )}
                  </div>
                );
              
              case "detail":
                return (
                  <div key={index} className="mb-4 p-4 bg-gray-50 border border-gray-200 rounded-lg">
                    <h4 className="font-semibold text-gray-800 mb-2">{block.title}</h4>
                    <p className="text-gray-700">{renderTextWithCitationLinks(block.content, citations)}</p>
                    {block.items && block.items.length > 0 && (
                      <ul className="list-disc list-inside text-gray-700 space-y-1 mt-2">
                        {block.items.map((item, itemIndex) => (
                          <li key={itemIndex}>{renderTextWithCitationLinks(item, citations)}</li>
                        ))}
                      </ul>
                    )}
                  </div>
                );
              
              case "list":
                return (
                  <div key={index} className="mb-4 p-4 bg-green-50 border border-green-200 rounded-lg">
                    <h4 className="font-semibold text-green-800 mb-2">{block.title}</h4>
                    {block.items && block.items.length > 0 && (
                      <ul className="list-disc list-inside text-green-700 space-y-1">
                        {block.items.map((item, itemIndex) => (
                          <li key={itemIndex}>{renderTextWithCitationLinks(item, citations)}</li>
                        ))}
                      </ul>
                    )}
                  </div>
                );
              
              default:
                return (
                  <div key={index} className="mb-4 p-4 bg-gray-100 border border-gray-300 rounded-lg">
                    <h4 className="font-semibold text-gray-800 mb-2">{block.title || "Information"}</h4>
                    <p className="text-gray-700">{renderTextWithCitationLinks(block.content, citations)}</p>
                  </div>
                );
            }
          });
        };

        // 引用をクリッカブルなリンクに変換する
        const renderTextWithCitationLinks = (text, citations) => {
          if (!text || !citations || citations.length === 0) return text;
          
          // Create a mapping from chunk IDs to citation numbers (case-insensitive)
          const chunkIdToNumber = {};
          citations.forEach((citation, index) => {
            const chunkId = citation.source_path || citation.file_path;
            if (chunkId) {
              chunkIdToNumber[chunkId] = index + 1;
              // Also map lowercase version for case-insensitive matching
              chunkIdToNumber[chunkId.toLowerCase()] = index + 1;
            }
          });
          
          // Split text by citation patterns [chunk_id]
          const parts = text.split(/(\[[^\]]+\])/g);
          return parts.map((part, i) => {
            const match = part.match(/^\[([^\]]+)\]$/);
            
            if (match) {
              const chunkId = match[1];
              const citationNumber = chunkIdToNumber[chunkId];
              
              if (citationNumber) {
                const citation = citations[citationNumber - 1];
                return (
                  <a
                    key={i}
                    href={`#citation-${citationNumber}`}
                    className="inline-citation-link text-blue-600 hover:text-blue-800 underline"
                    title={citation.source_path ? citation.source_path.split("/").pop().replace(".md", "") : ""}
                    onClick={(e) => {
                      e.preventDefault();
                      const el = document.getElementById(`citation-${citationNumber}`);
                      if (el) el.scrollIntoView({ behavior: "smooth", block: "nearest" });
                    }}
                  >
                    [{citationNumber}]
                  </a>
                );
              }
            }
            return part;
          });
        };

        
        const loadStatus = async () => {
          try {
            const response = await http.get("/api/status");
            setStatus(response);
          } catch (error) {
            console.error("Failed to load status:", error);
          }
        };

        const loadConfig = async () => {
          try {
            const response = await http.get("/api/config");
            setConfig(response.config);
          } catch (error) {
            console.error("Failed to load config:", error);
          }
        };

        const handleSendMessage = async () => {
          if (!inputValue.trim() || isLoading) return;

          const messageToSend = inputValue.trim();
          const userMessage = { role: "user", content: messageToSend };
          setMessages((prev) => [...prev, userMessage]);
          setInputValue("");
          setIsLoading(true);

          // Create a new AbortController for this request
          const controller = new AbortController();
          abortControllerRef.current = controller;

          try {
            const scope = {};
            if (scopeFolder.trim()) scope.folder = scopeFolder.trim();
            if (scopeTags.trim()) scope.tags = scopeTags.split(",").map(t => t.trim()).filter(Boolean);

            const response = await fetch("/api/chat", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                query: messageToSend,
                search_mode: searchMode,
                scope: Object.keys(scope).length > 0 ? scope : null,
                history: messages.slice(-20).map(m => ({ role: m.role, content: m.content || "" })),
              }),
              signal: controller.signal,
            });

            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const data = await response.json();

            const assistantMessage = {
              messageId: `msg_${Date.now()}`,
              role: "assistant",
              content: data.answer,
              answerBlocks: data.answer_blocks || [],
              citations: data.citations,
              originalQuery: messageToSend,
            };

            setMessages((prev) => [...prev, assistantMessage]);
          } catch (error) {
            if (error.name === "AbortError") {
              // User cancelled — add a cancelled message
              setMessages((prev) => [...prev, {
                role: "assistant",
                content: "（推論をキャンセルしました）",
                isError: false,
              }]);
            } else {
              const errorMessage = {
                role: "assistant",
                content: `Error: ${error.message || "Unknown error occurred"}`,
                isError: true,
              };
              setMessages((prev) => [...prev, errorMessage]);
            }
          } finally {
            setIsLoading(false);
            abortControllerRef.current = null;
          }
        };

        const handleCancel = () => {
          if (abortControllerRef.current) {
            abortControllerRef.current.abort();
          }
        };

        const handleIndex = async () => {
          setIsLoading(true);
          try {
            const response = await http.post("/api/index");
            // Reload status after indexing completes
            await loadStatus();
            // Show success message
            const successMessage = {
              role: "assistant",
              content: `Indexing completed successfully! Processed ${response.notes} notes and ${response.chunks} chunks.`,
              isSuccess: true,
            };
            setMessages((prev) => [...prev, successMessage]);
          } catch (error) {
            const errorMessage = {
              role: "assistant",
              content: `Indexing failed: ${error.message}`,
              isError: true,
            };
            setMessages((prev) => [...prev, errorMessage]);
          } finally {
            setIsLoading(false);
          }
        };

        const handleConfigUpdate = async (newConfig) => {
          try {
            await http.put("/api/config", newConfig);
            await loadConfig();
            await loadStatus();
            // Show success message
            const successMessage = {
              role: "assistant",
              content: "Configuration updated successfully!",
              isSuccess: true,
            };
            setMessages((prev) => [...prev, successMessage]);
          } catch (error) {
            const errorMessage = {
              role: "assistant",
              content: `Config update failed: ${error.message}`,
              isError: true,
            };
            setMessages((prev) => [...prev, errorMessage]);
          }
        };

        const getStatusIndicator = () => {
          const statusClass =
            status.index_status === "ready"
              ? "status-ready"
              : status.index_status === "error"
                ? "status-error"
                : "status-indexing";
          return <span className={`status-indicator ${statusClass}`}></span>;
        };

        return (
          <div className="flex h-screen bg-gray-50">
            <div className="w-80 bg-slate-800 text-white p-6 overflow-y-auto shadow-xl">
              <h2 className="text-2xl font-bold mb-6 text-blue-400">Orb - RAG Chatbot</h2>

              <div className="mb-6 p-4 bg-slate-700 rounded-lg border border-slate-600">
                <div className="flex items-center mb-3">
                  {getStatusIndicator()}
                  <span className="font-semibold text-white">Status</span>
                </div>
                <p className="text-sm text-slate-300 mb-2">
                  {status.index_status === "ready"
                    ? "Ready to chat"
                    : status.index_status === "not_indexed"
                      ? "Not indexed"
                      : "Indexing..."}
                </p>
                {status.total_chunks > 0 && (
                  <p className="text-xs text-slate-400">
                    {status.total_chunks} chunks indexed
                  </p>
                )}
              </div>

              <div className="mb-6">
                <h3 className="font-semibold text-white mb-3">Actions</h3>
                <div className="space-y-2">
                  <button
                    className="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-slate-600 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200 flex items-center justify-center"
                    onClick={handleIndex}
                    disabled={isLoading}
                  >
                    {isLoading ? (
                      <>
                        <span className="animate-spin mr-2">⟳</span>
                        Indexing...
                      </>
                    ) : (
                      "Index Vault"
                    )}
                  </button>
                  <button
                    className="w-full bg-slate-600 hover:bg-slate-700 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200"
                    onClick={() => setShowConfig(!showConfig)}
                  >
                    {showConfig ? "Hide Config" : "Show Config"}
                  </button>
                </div>
              </div>

              {showConfig && (
                <div className="p-4 bg-slate-700 rounded-lg border border-slate-600">
                  <h3 className="font-semibold text-white mb-4">Configuration</h3>
                  <div className="space-y-3">
                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-1">Vault Path</label>
                      <input
                        type="text"
                        className="w-full px-3 py-2 bg-slate-600 border border-slate-500 rounded-md text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        value={config.VAULT_PATH || ""}
                        onChange={(e) =>
                          setConfig({ ...config, VAULT_PATH: e.target.value })
                        }
                        placeholder="/path/to/vault"
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-1">LLM Provider</label>
                      <select
                        className="w-full px-3 py-2 bg-slate-600 border border-slate-500 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        value={config.LLM_PROVIDER || ""}
                        onChange={(e) =>
                          setConfig({ ...config, LLM_PROVIDER: e.target.value })
                        }
                      >
                        <option value="">Select provider</option>
                        <option value="local">Local</option>
                        <option value="openai">OpenAI</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-1">LLM Model</label>
                      <input
                        type="text"
                        className="w-full px-3 py-2 bg-slate-600 border border-slate-500 rounded-md text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        value={config.LLM_MODEL || ""}
                        onChange={(e) =>
                          setConfig({ ...config, LLM_MODEL: e.target.value })
                        }
                        placeholder="gpt-4o-mini"
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-1">
                        LLM Base URL (for local)
                      </label>
                      <input
                        type="text"
                        className="w-full px-3 py-2 bg-slate-600 border border-slate-500 rounded-md text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        value={config.LLM_BASE_URL || ""}
                        onChange={(e) =>
                          setConfig({ ...config, LLM_BASE_URL: e.target.value })
                        }
                        placeholder="http://localhost:11434"
                      />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-1">Embedding Provider</label>
                      <select
                        className="w-full px-3 py-2 bg-slate-600 border border-slate-500 rounded-md text-white focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        value={config.EMBEDDING_PROVIDER || ""}
                        onChange={(e) =>
                          setConfig({
                            ...config,
                            EMBEDDING_PROVIDER: e.target.value,
                          })
                        }
                      >
                        <option value="">Select provider</option>
                        <option value="local">Local</option>
                        <option value="openai">OpenAI</option>
                      </select>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-300 mb-1">Embedding Model</label>
                      <input
                        type="text"
                        className="w-full px-3 py-2 bg-slate-600 border border-slate-500 rounded-md text-white placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        value={config.EMBEDDING_MODEL || ""}
                        onChange={(e) =>
                          setConfig({
                            ...config,
                            EMBEDDING_MODEL: e.target.value,
                          })
                        }
                        placeholder="all-MiniLM-L6-v2"
                      />
                    </div>
                    <button
                      className="w-full bg-green-600 hover:bg-green-700 text-white font-medium py-2 px-4 rounded-lg transition-colors duration-200"
                      onClick={() => handleConfigUpdate(config)}
                    >
                      Update Config
                    </button>
                  </div>
                </div>
              )}
            </div>

            <div className="flex-1 flex flex-col">
              <div className="bg-white border-b border-gray-200 p-6 shadow-sm">
                <h1 className="text-2xl font-bold text-gray-800">Chat with your Obsidian Vault</h1>
              </div>

              <div className="flex-1 flex flex-col p-6 overflow-hidden">
                <div className="flex-1 overflow-y-auto mb-4 space-y-4">
                  {messages.length === 0 && (
                    <div className="text-center py-12">
                      <div className="max-w-md mx-auto">
                        <div className="mb-6">
                          <div className="w-16 h-16 bg-blue-100 rounded-full flex items-center justify-center mx-auto mb-4">
                            <span className="text-2xl text-blue-600">🤖</span>
                          </div>
                          <h3 className="text-xl font-semibold text-gray-800 mb-2">Welcome to Orb - RAG Chatbot!</h3>
                          <p className="text-gray-600 mb-4">
                            Start by asking a question about your vault content.
                          </p>
                          {status.index_status === "not_indexed" && (
                            <div className="bg-amber-50 border border-amber-200 rounded-lg p-4">
                              <p className="text-amber-800 text-sm">
                                ⚠️ Please index your vault first using the "Index Vault" button.
                              </p>
                            </div>
                          )}
                        </div>
                      </div>
                    </div>
                  )}

                  {messages.map((message, index) => (
                    <div
                      key={index}
                      className={`p-4 rounded-lg ${
                        message.role === "user" 
                          ? "bg-blue-50 ml-8" 
                          : "bg-gray-100 mr-8"
                      }`}
                    >
                      {message.role === "assistant" &&
                      message.answerBlocks &&
                      message.answerBlocks.length > 0 ? (
                        renderAnswerBlocks(message.answerBlocks, message.citations)
                      ) : (
                        <div className="text-gray-800">{renderTextWithCitationLinks(message.content, message.citations)}</div>
                      )}

                      {message.citations && message.citations.length > 0 && (
                        <div className="mt-4 p-3 bg-amber-50 border border-amber-200 rounded-lg">
                          <h4 className="font-semibold text-amber-800 mb-2">Sources:</h4>
                          <div className="space-y-2">
                            {message.citations
                              .map((citation, i) => (
                              <div key={i} id={`citation-${i + 1}`} className="flex items-start space-x-2">
                                <span className="bg-amber-200 text-amber-800 text-xs px-2 py-1 rounded-full font-semibold">
                                  {i + 1}
                                </span>
                                <a
                                  href={createObsidianUri(citation.source_path)}
                                  target="_blank"
                                  rel="noopener noreferrer"
                                  className="text-amber-700 hover:text-amber-900 underline text-sm"
                                  title="Open in Obsidian"
                                >
                                  {citation.source_path
                                    ? citation.source_path
                                        .split("/")
                                        .pop()
                                        .replace(".md", "")
                                        .replace(/::\d+$/, "") // Remove ::0, ::1, etc. at the end
                                    : "Unknown"}
                                </a>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {message.isError && (
                        <div className="mt-3 p-3 bg-red-50 border border-red-200 rounded-lg">
                          <span className="text-red-800 text-sm">
                            {message.content}
                          </span>
                        </div>
                      )}

                      {message.isSuccess && (
                        <div className="mt-3 p-3 bg-green-50 border border-green-200 rounded-lg">
                          <span className="text-green-800 text-sm">
                            {message.content}
                          </span>
                        </div>
                      )}

                      {message.role === "assistant" && !message.isError && message.messageId && (
                        <div className="mt-3">
                          <FeedbackButtons
                            messageId={message.messageId}
                            query={message.originalQuery || ""}
                            answer={message.content || ""}
                          />
                        </div>
                      )}
                    </div>
                  ))}

                  <div ref={messagesEndRef} />
                </div>

                <div className="bg-white border-t border-gray-200 p-4">
                  <div className="space-y-4">
                    <div className="grid grid-cols-3 gap-4">
                      <div>
                        <label className="block text-sm font-medium text-gray-700 mb-1">Search Mode</label>
                        <select
                          className="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                          value={searchMode}
                          onChange={(e) => setSearchMode(e.target.value)}
                        >
                          <option value="auto">Auto</option>
                          <option value="diary">Diary</option>
                          <option value="general">General</option>
                        </select>
                      </div>
                      <div className="col-span-2">
                        <label className="block text-sm font-medium text-gray-700 mb-1">Scope (optional)</label>
                        <div className="flex space-x-2">
                          <input
                            type="text"
                            className="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                            value={scopeFolder}
                            onChange={(e) => setScopeFolder(e.target.value)}
                            placeholder="Folder: e.g. daily/"
                          />
                          <input
                            type="text"
                            className="flex-1 px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent text-sm"
                            value={scopeTags}
                            onChange={(e) => setScopeTags(e.target.value)}
                            placeholder="Tags: e.g. journal, work"
                          />
                          {(scopeFolder.trim() || scopeTags.trim()) && (
                            <button
                              className="px-3 py-2 bg-gray-500 hover:bg-gray-600 text-white text-sm rounded-md transition-colors"
                              onClick={() => { setScopeFolder(""); setScopeTags(""); }}
                            >
                              Clear
                            </button>
                          )}
                        </div>
                      </div>
                    </div>
                    
                    <div className="flex space-x-2">
                      <input
                        type="text"
                        className="flex-1 px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-transparent"
                        value={inputValue}
                        onChange={(e) => setInputValue(e.target.value)}
                        onKeyPress={(e) =>
                          e.key === "Enter" && handleSendMessage()
                        }
                        placeholder="Ask a question about your vault..."
                        disabled={isLoading || status.index_status !== "ready"}
                      />
                      <button
                        className="px-6 py-3 bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-medium rounded-lg transition-colors flex items-center"
                        onClick={handleSendMessage}
                        disabled={
                          isLoading ||
                          status.index_status !== "ready" ||
                          !inputValue.trim()
                        }
                      >
                        {isLoading ? (
                          <>
                            <span className="animate-spin mr-2">⟳</span>
                            Sending...
                          </>
                        ) : (
                          "Send"
                        )}
                      </button>
                      {isLoading && (
                        <button
                          className="px-4 py-3 bg-red-600 hover:bg-red-700 text-white font-medium rounded-lg transition-colors"
                          onClick={handleCancel}
                          title="推論をキャンセル"
                        >
                          ■ Stop
                        </button>
                      )}
                    </div>

                    {status.index_status !== "ready" && (
                      <div className="bg-amber-50 border border-amber-200 rounded-lg p-3">
                        <p className="text-amber-800 text-sm">
                          {status.index_status === "not_indexed"
                            ? "Please index your vault first to start chatting."
                            : "Indexing in progress..."}
                        </p>
                      </div>
                    )}
                  </div>
                </div>
              </div>
            </div>
          </div>
        );
      }

      // Add error logging for debugging
      window.addEventListener("error", function (e) {
        console.error("JavaScript Error:", e.error);
        console.error("Error details:", {
          message: e.message,
          filename: e.filename,
          lineno: e.lineno,
          colno: e.colno,
        });
      });

      // Add unhandled promise rejection logging
      window.addEventListener("unhandledrejection", function (e) {
        console.error("Unhandled Promise Rejection:", e.reason);
      });

      // Wait for DOM to be ready before rendering
      function initializeApp() {
        console.log("DOM ready, checking for root element...");
        const rootElement = document.getElementById("root");

        if (!rootElement) {
          console.error("Root element not found!");
          return;
        }

        console.log("Root element found, starting React render...");
        try {
          // Use React 18's createRoot API
          const root = ReactDOM.createRoot(rootElement);
          root.render(<App />);
          console.log("React render completed successfully");
        } catch (error) {
          console.error("React render failed:", error);
          // Fallback: show error message
          rootElement.innerHTML = `
                    <div style="padding: 20px; color: red;">
                        <h2>Application Error</h2>
                        <p>Failed to render the application:</p>
                        <pre>${error.message}</pre>
                    </div>
                `;
        }
      }

      // Check if DOM is already ready
      if (document.readyState === "loading") {
        document.addEventListener("DOMContentLoaded", initializeApp);
      } else {
        initializeApp();
      }
    </script>
  </body>
</html>
