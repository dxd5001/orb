# Ruff configuration file for Orb project
# This file extends the configuration in pyproject.toml

# Line length (same as Black)
line-length = 88

# Target Python version
target-version = "py38"

# Exclude directories and files
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    "__pypackages__",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "venv",
]

# Per-file ignores
[per-file-ignores]
"tests/**/*" = ["E501", "F401", "S101", "ARG001", "ARG002"]
"__init__.py" = ["F401"]
"menubar_app.py" = ["T201", "S603"]
"mcp_server.py" = ["T201", "S603"]
"backend/tests/**/*" = ["S101", "ARG001", "ARG002"]

# Rule configuration
[lint]
# Enable pycodestyle (E, W), Pyflakes (F), and other useful rules
select = [
    # pycodestyle
    "E",
    # Pyflakes
    "F",
    # pyupgrade
    "UP",
    # flake8-bugbear
    "B",
    # flake8-simplify
    "SIM",
    # isort
    "I",
    # pep8-naming
    "N",
    # flake8-unused-arguments
    "ARG",
    # flake8-return
    "RET",
    # flake8-raise
    "RSE",
    # flake8-logging
    "LOG",
    # flake8-comprehensions
    "C4",
    # flake8-bandit (security)
    "S",
    # flake8-datetimez
    "DTZ",
    # flake8-tidy-imports
    "TID",
    # flake8-import-conventions
    "ICN",
    # flake8-pytest-style
    "PT",
    # flake8-quotes
    "Q",
    # flake8-errmsg
    "EM",
    # flake8-print
    "T20",
    # flake8-todos
    "TD",
    # flake8-fixme
    "FIX",
    # Ruff-specific rules
    "RUF",
]

# Ignore specific rules
ignore = [
    # Star imports
    "F405",
    # Line too long (handled by Black)
    "E501",
    # Unused arguments (allow underscore prefix)
    "ARG002",
    # Print statements (allow for debugging)
    "T201",
    # TODO comments (allow)
    "TD003",
    # Fixme comments (allow)
    "FIX002",
    # Magic numbers (allow for configuration)
    "S105",
    # Hardcoded passwords (allow for examples)
    "S106",
    # Hardcoded SQL strings (allow)
    "S608",
    # Subprocess without shell (allow for this project)
    "S603",
    # Assert statements (allow in tests)
    "S101",
    # Unused arguments in tests
    "ARG001",
]

# Allow fix for all enabled rules (when `--fix`) is provided
fixable = ["ALL"]
unfixable = []

# Allow unused variables when underscore-prefixed
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

[format]
# Like Black, use double quotes for strings
quote-style = "double"

# Like Black, indent with spaces, rather than tabs
indent-style = "space"

# Like Black, respect magic trailing commas
skip-magic-trailing-comma = false

# Like Black, automatically detect the appropriate line ending
line-ending = "auto"

[lint.isort]
known-first-party = ["orb"]
known-third-party = ["fastapi", "uvicorn", "chromadb", "sentence_transformers", "langchain", "openai"]

[lint.mccabe]
# Unlike Flake8, default to a complexity level of 10.
max-complexity = 10
